name: Health check harian

on:
  schedule:
    # 22:00 UTC = 05:00 WIB
    - cron: "0 22 * * *"
  workflow_dispatch: {} # bisa dijalankan manual dari tab Actions

permissions:
  contents: write

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Jalankan health check
        run: node scripts/healthcheck.mjs

      - name: Commit hasil bila berubah
        run: |
          git config user.name "modalnol-bot"
          git config user.email "bot@modalnol.id"
          git add src/data/status.json
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan status."
          else
            git commit -m "chore: update status health check [skip ci]"
            git push
          fi
